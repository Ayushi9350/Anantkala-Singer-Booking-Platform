{% load static %}
{% load socialaccount %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Anantkala</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body { background: var(--black); }
    .particles {
      position: fixed; inset: 0;
      background-image: 
        radial-gradient(1px 1px at 15% 25%, rgba(212,175,55,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 15%, rgba(212,175,55,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 65%, rgba(212,175,55,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 80%, rgba(212,175,55,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(212,175,55,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5% 60%, rgba(212,175,55,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 95% 85%, rgba(212,175,55,0.4) 0%, transparent 100%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="particles"></div>

  <div style="position:fixed; inset:0; background:radial-gradient(ellipse at center, rgba(212,175,55,0.07) 0%, transparent 70%); pointer-events:none;"></div>

  <div class="login-page">
    <div class="login-box" style="animation: fadeInUp 0.8s ease both;">
      
      <!-- DECORATIVE TOP LINE -->
      <div style="width:40px; height:1px; background:var(--gold); margin:0 auto 30px;"></div>
      
      <div class="login-logo">A</div>
      <h1 style="font-family:var(--font-display); font-size:28px; color:var(--gold); margin-bottom:8px;">Anantkala</h1>
      <p class="login-tagline">Where Music Meets the Eternal</p>
      
      <div style="width:60px; height:1px; background:linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 36px;"></div>
      
      <p style="font-size:17px; color:var(--white-dim); font-style:italic; margin-bottom:36px;">
        Sign in to book your favourite singers and manage your events
      </p>

      <!-- GOOGLE LOGIN BUTTON -->
      <a href="{% provider_login_url 'google' %}" class="btn-google">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </a>

      <div style="margin-top:30px; display:flex; align-items:center; gap:16px;">
        <div style="flex:1; height:1px; background:rgba(212,175,55,0.15);"></div>
        <span style="font-family:var(--font-heading); font-size:10px; letter-spacing:2px; color:rgba(245,240,232,0.3);">SECURE LOGIN</span>
        <div style="flex:1; height:1px; background:rgba(212,175,55,0.15);"></div>
      </div>

      <p style="margin-top:24px; font-size:14px; color:rgba(245,240,232,0.35); font-style:italic;">
        By continuing, you agree to our terms of service
      </p>

      <div style="margin-top:30px;">
        <a href="{% url 'home' %}" style="font-family:var(--font-heading); font-size:11px; letter-spacing:2px; color:var(--gold); text-decoration:none; opacity:0.7;">
          ← Back to Home
        </a>
      </div>
      
      <!-- DECORATIVE BOTTOM LINE -->
      <div style="width:40px; height:1px; background:var(--gold); margin:30px auto 0;"></div>
    </div>
  </div>
</body>
</html>
