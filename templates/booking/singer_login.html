{% extends 'base.html' %}
{% block content %}
<div style="max-width:400px;margin:100px auto;padding:40px;background:#1a1a2e;border:1px solid gold;border-radius:10px;">
    <h2 style="color:gold;text-align:center;margin-bottom:30px;">Singer Login</h2>

    {% for message in messages %}
        <p style="color:red;text-align:center;">{{ message }}</p>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required
            style="width:100%;padding:12px;margin-bottom:15px;background:#0d0d1a;border:1px solid gold;color:white;border-radius:5px;box-sizing:border-box;">

        <input type="password" name="password" placeholder="Password" required
            style="width:100%;padding:12px;margin-bottom:20px;background:#0d0d1a;border:1px solid gold;color:white;border-radius:5px;box-sizing:border-box;">
            <div style="text-align:right;margin-bottom:15px;">
    <a href="{% url 'password_reset' %}" style="color:gold;text-decoration:none;">
        Forgot Password?
    </a>
</div>

        <button type="submit"
            style="width:100%;padding:12px;background:gold;color:black;border:none;border-radius:5px;font-weight:bold;cursor:pointer;">
            Login as Singer
        </button>
    </form>

    <p style="text-align:center;margin-top:15px;color:white;">
        Don't have a singer account?
        <a href="{% url 'singer_register' %}" style="color:gold;">
            Register Here
        </a>
    </p>

</div>
{% endblock %}
