{% extends 'base.html' %}
{% block content %}
<div class="booking-container">
  <h2 style="font-family:var(--font-display); color:var(--gold); margin-bottom:24px;">Complete Sign Up</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-gold" style="width:100%; border:none; cursor:pointer; padding:16px;">Complete Registration</button>
  </form>
</div>
{% endblock %}
